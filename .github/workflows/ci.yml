name: ci

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: gcc:16.1

    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Release
          - Debug

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Verify compiler
      run: g++ --version

    - name: Install dependencies
      run: apt-get -y update && apt-get -y install libbenchmark-dev libboost-test-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build --preset default -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCMAKE_COMPILE_WARNING_AS_ERROR=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{matrix.build_type}}
